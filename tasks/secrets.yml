---
- name: Create the secrets directory
  file:
    path: "{{ secrets_path }}"
    state: directory
    owner: root
    group: root
    mode: "0700"

- name: Generate the application secret
  shell: umask 077 && openssl rand -hex 32 > {{ secrets_path }}/app_secret
  args:
    creates: "{{ secrets_path }}/app_secret"

- name: Generate the database password
  shell: umask 077 && openssl rand -hex 32 > {{ secrets_path }}/db_password
  args:
    creates: "{{ secrets_path }}/db_password"

- name: Read the application secret
  slurp:
    src: "{{ secrets_path }}/app_secret"
  register: app_secret_file

- name: Read the database password
  slurp:
    src: "{{ secrets_path }}/db_password"
  register: db_password_file

- name: Register the secrets as variables
  set_fact:
    app_secret: "{{ app_secret_file.content | b64decode | trim }}"
    db_password: "{{ db_password_file.content | b64decode | trim }}"
